{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card p-5">

            <h2 class="fw-bold gold-text mb-3">
                {{ project.title }}
            </h2>

            <p class="text-light">
                {{ project.description }}
            </p>

            <hr style="border-color:#d4af37;">

            <p>
                <strong class="gold-text">Tech Stack:
                {{ project.tech_stack }}</strong>
            </p>

            {% if project.github_link %}
                <a href="{{ project.github_link }}"
                   target="_blank"
                   class="btn gold-btn me-2 mt-3">
                   GitHub
                </a>
            {% endif %}

            {% if project.live_demo_link %}
                <a href="{{ project.live_demo_link }}"
                   target="_blank"
                   class="btn btn-outline-warning mt-3">
                   Live Demo
                </a>
            {% endif %}

        </div>

    </div>

</div>

{% endblock %}

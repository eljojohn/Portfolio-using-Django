{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            background:#000;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#111;
            padding:40px;
            border-radius:10px;
            width:320px;
            border:1px solid #d4af37;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            background:#000;
            border:1px solid #d4af37;
            color:white;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            background:#d4af37;
            border:none;
            color:black;
            font-weight:bold;
            border-radius:6px;
            cursor:pointer;
        }

        .error{
            color:red;
            margin-top:10px;
        }

        a{
            color:#d4af37;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Login</h2>

    <!-- IMPORTANT PART -->
    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <p>Don't have an account?
        <a href="{% url 'signup' %}">Signup</a>
    </p>

</div>

</body>
</html>


{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <link rel="stylesheet" href="{% static 'css/portfolio.css' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
     <body> 
        
        {
            background: linear-gradient(135deg, #000000, #111111);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .gold-text {
            color: #d4af37;
        }

        .navbar {
            background-color: #000;
            border-bottom: 1px solid #d4af37;
        }

        .nav-link {
            color: white !important;
            margin-left: 10px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #d4af37 !important;
        }

        .gold-btn {
            background-color: #d4af37;
            color: black;
            border: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .gold-btn:hover {
            background-color: #b9962f;
            transform: scale(1.03);
        }

        .card {
            background-color: #111;
            border: 1px solid #d4af37;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        input, textarea {
            background-color: #000 !important;
            color: white !important;
            border: 1px solid #d4af37 !important;
        }

        input:focus, textarea:focus {
            box-shadow: 0 0 5px #d4af37 !important;
            border-color: #d4af37 !important;
        }

        footer {
            border-top: 1px solid #d4af37;
            margin-top: 60px;
            padding: 20px 0;
            text-align: center;
            color: #aaa;
        }
    </style>
</head>
<body>



    <div class="animated-bg">
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand gold-text fw-bold" href="{% url 'home' %}">
            MyPortfolio
        </a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'projects' %}">Projects</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contact' %}">Contact</a>
                </li>

                {% if user.is_authenticated %}

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
    <form action="{% url 'logout' %}" method="POST" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="nav-link gold-text btn btn-link p-2" style="text-decoration:none;">
            Logout
        </button>
    </form>
</li>


                {% else %}

                    <li class="nav-item">
                        <a class="nav-link gold-text" href="{% url 'login' %}">
                            Login
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link gold-text" href="{% url 'signup' %}">
                            Sign Up
                        </a>
                    </li>

                {% endif %}

            </ul>
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

<!-- FOOTER -->
<footer>
    © 2026 My Portfolio | Built with Django
</footer>


</body>
</html>
